openapi: 3.1.0
info:
  title: Pedii Agent API
  version: 2.0.0
  description: |
    APIs utilizadas pelo agente de vendas WhatsApp do Pedii.
    Todas as rotas requerem autenticação via Bearer token.

    ## Autenticação
    O agente GCP usa uma chave estática (`AGENT_API_KEY`) armazenada no GCP Secret Manager.
    Passe-a em todas as requisições:
    ```
    Authorization: Bearer <AGENT_API_KEY>
    ```

    ## Base URL
    ```
    https://qiqwylcjoyztqebqglok.supabase.co/functions/v1
    ```

    ## Webhooks recebidos pelo agente
    O Pedii envia eventos ao agente quando ações ocorrem no dashboard do lojista.
    O agente deve expor um endpoint HTTP para receber esses eventos.
    Ver seção `webhooks` ao final deste documento.

servers:
  - url: https://qiqwylcjoyztqebqglok.supabase.co/functions/v1
    description: Supabase Edge Functions (produção)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: AGENT_API_KEY armazenada no GCP Secret Manager

  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
          example: João Silva
        whatsapp:
          type: string
          description: Número normalizado (somente dígitos, com DDI)
          example: "5531999990000"
        cep:
          type: string
          example: "37062683"
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          example: MG
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legacy_id:
          type: string
          nullable: true
          description: ID do sistema legado (ERP/PDV). Nulo se não integrado.
        descricao:
          type: string
          example: Café Especial 250g
        unidade_medida:
          type: string
          enum: [UN, KG, G, LT, ML, MT, CM, CX, PC, DZ, PR]
        quantidade:
          type: number
          description: Quantidade disponível em estoque
          example: 48.0
        valor_venda:
          type: number
          format: double
          description: Preço de venda em BRL
          example: 32.90
        updated_at:
          type: string
          format: date-time
        group:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
              example: Cafés

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
          example: 2
        unit_price:
          type: number
          format: double
          example: 32.90
        subtotal:
          type: number
          format: double
          example: 65.80
        products:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            descricao:
              type: string
            unidade_medida:
              type: string
            legacy_id:
              type: string
              nullable: true

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, accepted, shipped, received, cancelled]
          description: |
            Máquina de estados:
            open → accepted | cancelled
            accepted → shipped | cancelled
            shipped → received | cancelled
            received → (terminal)
            cancelled → (terminal)
        notes:
          type: string
          nullable: true
        total:
          type: number
          format: double
          description: Total dos itens + frete
        shipping_value:
          type: number
          format: double
          description: Valor do frete em BRL
        shipping_distance_km:
          type: number
          format: double
          nullable: true
        shipping_within_radius:
          type: boolean
          nullable: true
        agent_created:
          type: boolean
          description: True se o pedido foi criado pelo agente via API
        created_by:
          type: string
          format: uuid
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        shipped_at:
          type: string
          format: date-time
          nullable: true
        received_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        stores:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            razao_social:
              type: string
            apelido:
              type: string
        customers:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
            whatsapp:
              type: string
        order_items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    FreteResult:
      type: object
      properties:
        dentro_raio:
          type: boolean
          description: Se o cliente está dentro do raio de entrega da loja
        distancia_km:
          type: number
          description: Distância em km entre loja e cliente (Haversine)
          example: 3.24
        raio_entrega_km:
          type: number
          description: Raio máximo de entrega configurado na loja
          example: 5.0
        valor_frete:
          type: number
          description: Valor do frete em BRL. Zero se frete grátis ou fora do raio.
          example: 9.72
        frete_gratis:
          type: boolean
          description: True se o frete foi zerado por regra de negócio
        pedido_minimo_entrega:
          type: number
          description: Valor mínimo do pedido para habilitar entrega. Zero = sem mínimo.
          example: 30.00
        frete_gratis_acima_de:
          type: number
          nullable: true
          description: Valor do pedido para ganhar frete grátis. Null = regra desativada.
          example: 100.00
        _geocodificado:
          type: object
          description: Indica se lat/lng foi calculado nesta chamada (lazy geocoding)
          properties:
            loja:
              type: boolean
            cliente:
              type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
        detalhes:
          type: string
          nullable: true

paths:
  # ────────────────────────────────────────────────────────────────────────────
  # CUSTOMERS
  # ────────────────────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: buscarCliente
      summary: Buscar cliente pelo número de WhatsApp ou ID
      description: |
        Procura um cliente na organização vinculada à `store_id`.
        Ideal para verificar se o cliente já está cadastrado antes de iniciar uma conversa.
      parameters:
        - name: store_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID da loja atendida pelo agente
        - name: whatsapp
          in: query
          schema:
            type: string
          description: "Número do WhatsApp (com DDI). Ex: 5531999990000. Obrigatório se id não for informado."
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: UUID do cliente. Obrigatório se whatsapp não for informado.
      responses:
        "200":
          description: Resultado da busca
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  customer:
                    oneOf:
                      - $ref: "#/components/schemas/Customer"
                      - type: "null"
        "400":
          description: Parâmetros inválidos
        "401":
          description: Token inválido ou ausente
        "404":
          description: Loja não encontrada

    post:
      operationId: criarOuAtualizarCliente
      summary: Criar ou atualizar cliente
      description: |
        Cria um novo cliente ou atualiza os dados de um existente (upsert por `whatsapp` + organização).
        O geocoding de lat/lng acontece automaticamente via trigger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - store_id
                - nome
                - whatsapp
              properties:
                store_id:
                  type: string
                  format: uuid
                nome:
                  type: string
                  example: João Silva
                whatsapp:
                  type: string
                  example: "5531999990000"
                logradouro:
                  type: string
                numero:
                  type: string
                complemento:
                  type: string
                bairro:
                  type: string
                cidade:
                  type: string
                estado:
                  type: string
                  example: MG
                cep:
                  type: string
                  example: "37062683"
      responses:
        "201":
          description: Cliente criado ou atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: "#/components/schemas/Customer"
        "400":
          description: Campos obrigatórios ausentes
        "401":
          description: Token inválido
        "404":
          description: Loja não encontrada

  # ────────────────────────────────────────────────────────────────────────────
  # PRODUCTS
  # ────────────────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: consultarEstoque
      summary: Consultar produtos em estoque de uma loja
      parameters:
        - name: store_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
          description: "Busca textual na descrição (case-insensitive)"
        - name: group_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por grupo/categoria
        - name: in_stock
          in: query
          schema:
            type: boolean
            default: false
          description: Se true, retorna apenas produtos com quantidade > 0
      responses:
        "200":
          description: Lista de produtos
          content:
            application/json:
              schema:
                type: object
                properties:
                  store:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      nome:
                        type: string
                  total:
                    type: integer
                  products:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        nome:
                          type: string
        "400":
          description: store_id não informado
        "401":
          description: Token inválido
        "404":
          description: Loja não encontrada

  # ────────────────────────────────────────────────────────────────────────────
  # CALCULATE FREIGHT
  # ────────────────────────────────────────────────────────────────────────────
  /calculate-freight:
    post:
      operationId: calcularFrete
      summary: Calcular frete e verificar raio de entrega
      description: |
        Recebe `loja_id` e `cliente_id`, calcula a distância via Haversine
        e retorna o valor do frete com base nas configurações da organização.

        **Lazy geocoding:** se loja ou cliente ainda não têm lat/lng, a função geocodifica
        automaticamente e persiste as coordenadas para chamadas futuras.

        **Lógica:**
        1. `distancia_km × valor_por_km` = valor base
        2. Se valor base < `valor_minimo` → usa `valor_minimo`
        3. Se valor do pedido ≥ `frete_gratis_acima_de` → `valor_frete = 0`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loja_id
                - cliente_id
              properties:
                loja_id:
                  type: string
                  format: uuid
                cliente_id:
                  type: string
                  format: uuid
            example:
              loja_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              cliente_id: "ee4d2a74-25fd-4432-91a8-96121c6bf64e"
      responses:
        "200":
          description: Resultado do cálculo de frete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreteResult"
              examples:
                dentro_raio:
                  summary: Cliente dentro do raio
                  value:
                    dentro_raio: true
                    distancia_km: 3.24
                    raio_entrega_km: 5.0
                    valor_frete: 9.72
                    frete_gratis: false
                    pedido_minimo_entrega: 30.00
                    frete_gratis_acima_de: 100.00
                    _geocodificado:
                      loja: false
                      cliente: false
                fora_do_raio:
                  summary: Cliente fora do raio
                  value:
                    dentro_raio: false
                    distancia_km: 8.51
                    raio_entrega_km: 5.0
                    valor_frete: 0
                    frete_gratis: false
                    pedido_minimo_entrega: 30.00
                    frete_gratis_acima_de: null
                    _geocodificado:
                      loja: false
                      cliente: false
        "400":
          description: Parâmetros ausentes
        "401":
          description: Token inválido
        "403":
          description: Loja e cliente de organizações diferentes
        "404":
          description: Loja ou cliente não encontrado
        "422":
          description: Não foi possível geocodificar (endereço incompleto)

  # ────────────────────────────────────────────────────────────────────────────
  # ORDERS
  # ────────────────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: consultarPedidos
      summary: Listar pedidos ou buscar pedido por ID
      description: |
        Retorna lista paginada de pedidos de uma loja, ou um pedido específico com todos os detalhes.

        Para buscar um pedido único (com itens e produtos), passe apenas `id` como parâmetro.
        Para listar, passe `store_id` e os filtros desejados.
      parameters:
        - name: store_id
          in: query
          schema:
            type: string
            format: uuid
          description: ID da loja. Obrigatório para listagem.
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: UUID do pedido. Retorna pedido único com todos os detalhes (itens + produtos).
        - name: status
          in: query
          schema:
            type: string
            enum: [open, accepted, shipped, received, cancelled]
          description: Filtrar por status
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por cliente
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: "Data inicial (ex: 2026-03-01)"
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: "Data final (ex: 2026-03-31)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Lista de pedidos ou pedido único
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Listagem paginada
                    properties:
                      orders:
                        type: array
                        items:
                          $ref: "#/components/schemas/Order"
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                  - type: object
                    description: Pedido único (quando id é informado)
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
              examples:
                listagem:
                  summary: Listagem paginada
                  value:
                    orders:
                      - id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                        status: open
                        total: 310.00
                        shipping_value: 10.00
                        agent_created: true
                        created_at: "2026-03-20T14:53:00Z"
                        stores:
                          id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                          apelido: Paraguaçu
                        customers:
                          id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                          nome: Eloá Mariane da Luz
                          whatsapp: "(35) 98272-1736"
                    total: 1
                    page: 1
                    limit: 50
                pedido_unico:
                  summary: Pedido único com itens
                  value:
                    order:
                      id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                      status: accepted
                      total: 310.00
                      shipping_value: 10.00
                      shipping_distance_km: 3.24
                      shipping_within_radius: true
                      agent_created: true
                      accepted_at: "2026-03-20T15:10:00Z"
                      stores:
                        id: "4d22e5f2-..."
                        apelido: Paraguaçu
                      customers:
                        id: "3ed79bc1-..."
                        nome: Eloá Mariane da Luz
                        whatsapp: "(35) 98272-1736"
                      order_items:
                        - id: "3026e0e8-..."
                          quantity: 15
                          unit_price: 20.00
                          subtotal: 300.00
                          products:
                            descricao: Produto Teste Paraguaçu
                            unidade_medida: UN
        "400":
          description: store_id não informado
        "401":
          description: Token inválido
        "404":
          description: Pedido não encontrado

    post:
      operationId: criarPedido
      summary: Criar pedido
      description: |
        Registra um novo pedido no dashboard do lojista.
        Pode incluir os itens já na criação (recomendado) ou adicioná-los depois via PATCH.

        O campo `shipping_*` deve ser preenchido com o resultado de `POST /calculate-freight`.
        O total do pedido é calculado automaticamente pelo banco (itens + frete).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - store_id
                - customer_id
              properties:
                store_id:
                  type: string
                  format: uuid
                customer_id:
                  type: string
                  format: uuid
                notes:
                  type: string
                  nullable: true
                  description: Observações do pedido (instruções de entrega, referência, etc.)
                shipping_value:
                  type: number
                  format: double
                  default: 0
                  description: Valor do frete em BRL (obtido via /calculate-freight)
                shipping_distance_km:
                  type: number
                  format: double
                  nullable: true
                  description: Distância calculada em km
                shipping_within_radius:
                  type: boolean
                  nullable: true
                  description: Se o cliente estava dentro do raio no momento do pedido
                items:
                  type: array
                  description: Itens do pedido (opcional na criação, pode ser adicionado via PATCH)
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                        example: 2
                      unit_price:
                        type: number
                        format: double
                        example: 32.90
            example:
              store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
              customer_id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
              notes: "Entregar no período da tarde"
              shipping_value: 9.72
              shipping_distance_km: 3.24
              shipping_within_radius: true
              items:
                - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                  quantity: 2
                  unit_price: 32.90
      responses:
        "201":
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
        "207":
          description: Pedido criado mas houve erro ao inserir os itens
        "400":
          description: Campos obrigatórios ausentes
        "401":
          description: Token inválido
        "404":
          description: Loja ou cliente não encontrado

    patch:
      operationId: atualizarPedido
      summary: Atualizar status ou adicionar itens ao pedido
      description: |
        Duas ações disponíveis via `action`:

        **`update_status`** (padrão): Avança o status do pedido conforme a máquina de estados.
        Transições válidas:
        - `open → accepted | cancelled`
        - `accepted → shipped | cancelled`
        - `shipped → received | cancelled`
        - `received` e `cancelled` são estados terminais

        **`add_items`**: Adiciona novos itens a um pedido em aberto (`open`) ou aceito (`accepted`).
        O total é recalculado automaticamente pelo banco.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: ID do pedido
                action:
                  type: string
                  enum: [update_status, add_items]
                  default: update_status
                status:
                  type: string
                  enum: [accepted, shipped, received, cancelled]
                  description: Novo status (obrigatório para action=update_status)
                items:
                  type: array
                  description: Itens a adicionar (obrigatório para action=add_items)
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                      unit_price:
                        type: number
                        format: double
            examples:
              update_status:
                summary: Aceitar pedido
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: update_status
                  status: accepted
              add_items:
                summary: Adicionar itens
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: add_items
                  items:
                    - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      quantity: 1
                      unit_price: 20.00
      responses:
        "200":
          description: Pedido atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
        "400":
          description: Campos obrigatórios ausentes ou action inválido
        "401":
          description: Token inválido
        "404":
          description: Pedido não encontrado
        "422":
          description: Transição de status inválida ou pedido não permite adicionar itens
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Transição inválida: received → cancelled"
                  allowed:
                    type: array
                    items:
                      type: string
                    example: []

# ──────────────────────────────────────────────────────────────────────────────
# WEBHOOKS — eventos enviados pelo Pedii ao agente GCP
# ──────────────────────────────────────────────────────────────────────────────
webhooks:
  order.status_changed:
    post:
      summary: Mudança de status de pedido pelo lojista
      description: |
        Disparado quando o **lojista** muda o status de um pedido pelo dashboard SaaS.
        Mudanças feitas pelo próprio agente via API **não** disparam este webhook (evita loop).

        **Autenticação recebida:**
        - Header `Authorization: Bearer <AGENT_API_KEY>` — mesma chave usada nas chamadas de saída
        - Header `x-internal-secret` — segredo compartilhado entre Supabase e o agente

        **Casos de uso:**
        - `open → accepted`: notificar cliente que o pedido foi aceito
        - `accepted → shipped`: notificar cliente que o pedido saiu para entrega
        - `shipped → received`: confirmar recebimento
        - `* → cancelled`: informar cancelamento ao cliente

        O agente deve usar `customers.whatsapp` para enviar a mensagem no conversacional.
      requestBody:
        required: true
        content:
