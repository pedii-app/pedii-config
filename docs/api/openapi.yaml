openapi: 3.1.0
info:
  title: Pedii Agent API
  version: 3.0.0
  description: |
    APIs utilizadas pelo agente de vendas WhatsApp do Pedii.
    Todas as rotas requerem autenticação via Bearer token.

    ## Autenticação
    O agente GCP usa uma chave estática (`AGENT_API_KEY`) armazenada no GCP Secret Manager.
    Passe-a em todas as requisições:
    ```
    Authorization: Bearer <AGENT_API_KEY>
    ```

    ## Base URL
    ```
    https://qiqwylcjoyztqebqglok.supabase.co/functions/v1
    ```

    ## Campos presentes em todas as respostas
    Toda resposta bem-sucedida inclui:
    - `organization_id` (uuid): ID da organização (tenant raiz do Pedii)
    - `instance_name` (string | null): Nome da instância WhatsApp conectada na Evolution API

    ## Webhooks recebidos pelo agente
    O Pedii envia eventos ao agente quando ações ocorrem no dashboard do lojista.
    O agente deve expor um endpoint HTTP para receber esses eventos.
    Ver seção `webhooks` ao final deste documento.

servers:
  - url: https://qiqwylcjoyztqebqglok.supabase.co/functions/v1
    description: Supabase Edge Functions (produção)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: AGENT_API_KEY armazenada no GCP Secret Manager

  schemas:
    # ─────────────────────────────────────────────────────────────────────────
    # Envelope de contexto presente em todas as respostas
    # ─────────────────────────────────────────────────────────────────────────
    OrgContext:
      type: object
      description: Campos de contexto presentes em todas as respostas bem-sucedidas
      properties:
        organization_id:
          type: string
          format: uuid
          description: ID da organização (tenant raiz)
          example: "f988b66e-21e6-48d5-a90d-08f746600763"
        instance_name:
          type: string
          nullable: true
          description: Nome da instância WhatsApp conectada na Evolution API
          example: "pedii_f988b66e"

    # ─────────────────────────────────────────────────────────────────────────
    # Customer
    # ─────────────────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
          example: João Silva
        whatsapp:
          type: string
          description: Número normalizado (somente dígitos, com DDI)
          example: "5531999990000"
        cep:
          type: string
          example: "37062683"
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          example: MG
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time

    CustomerSummary:
      type: object
      description: Resumo do cliente embutido nas respostas de pedido e frete
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        whatsapp:
          type: string
          description: Número normalizado (somente dígitos)
          example: "5531999990000"

    # ─────────────────────────────────────────────────────────────────────────
    # Product
    # ─────────────────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
          description: ID da loja à qual o produto pertence
        store_nome:
          type: string
          nullable: true
          description: Nome da loja (apelido ou razão social). Útil na busca multi-loja.
          example: "Varginha"
        legacy_id:
          type: string
          nullable: true
          description: ID do sistema legado (ERP/PDV). Nulo se não integrado.
        descricao:
          type: string
          example: Café Especial 250g
        unidade_medida:
          type: string
          enum: [UN, KG, G, LT, ML, MT, CM, CX, PC, DZ, PR]
        quantidade:
          type: number
          description: Quantidade disponível em estoque
          example: 48.0
        valor_venda:
          type: number
          format: double
          description: Preço de venda em BRL
          example: 32.90
        updated_at:
          type: string
          format: date-time
        group:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
              example: Cafés

    # ─────────────────────────────────────────────────────────────────────────
    # Order
    # ─────────────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
          example: 2
        unit_price:
          type: number
          format: double
          example: 32.90
        subtotal:
          type: number
          format: double
          example: 65.80
        created_at:
          type: string
          format: date-time
        products:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            descricao:
              type: string
            unidade_medida:
              type: string
            legacy_id:
              type: string
              nullable: true

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, accepted, shipped, received, cancelled]
          description: |
            Máquina de estados:
            open → accepted | cancelled
            accepted → shipped | cancelled
            shipped → received | cancelled
            received → (terminal)
            cancelled → (terminal)
        notes:
          type: string
          nullable: true
        total:
          type: number
          format: double
          description: Total dos itens + frete (calculado automaticamente)
        shipping_value:
          type: number
          format: double
          description: Valor do frete em BRL
        shipping_distance_km:
          type: number
          format: double
          nullable: true
        shipping_within_radius:
          type: boolean
          nullable: true
        agent_created:
          type: boolean
          description: True se o pedido foi criado pelo agente via API
        status_changed_by_agent:
          type: boolean
          description: True se o último update de status foi feito pelo agente (previne loop de webhook)
        created_by:
          type: string
          format: uuid
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        shipped_at:
          type: string
          format: date-time
          nullable: true
        received_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        stores:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            razao_social:
              type: string
            apelido:
              type: string
        customers:
          $ref: "#/components/schemas/CustomerSummary"
        order_items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    # ─────────────────────────────────────────────────────────────────────────
    # Freight
    # ─────────────────────────────────────────────────────────────────────────
    FreteResult:
      allOf:
        - $ref: "#/components/schemas/OrgContext"
        - type: object
          properties:
            customer:
              $ref: "#/components/schemas/CustomerSummary"
            dentro_raio:
              type: boolean
              description: Se o cliente está dentro do raio de entrega da loja
            distancia_km:
              type: number
              description: Distância em km entre loja e cliente (Haversine)
              example: 3.24
            raio_entrega_km:
              type: number
              description: Raio máximo de entrega configurado na loja
              example: 5.0
            valor_frete:
              type: number
              description: Valor do frete em BRL. Zero se frete grátis ou fora do raio.
              example: 9.72
            frete_gratis:
              type: boolean
              description: True se o frete foi zerado por regra de negócio
            pedido_minimo_entrega:
              type: number
              description: Valor mínimo do pedido para habilitar entrega. Zero = sem mínimo.
              example: 30.00
            frete_gratis_acima_de:
              type: number
              nullable: true
              description: Valor do pedido para ganhar frete grátis. Null = regra desativada.
              example: 100.00
            _geocodificado:
              type: object
              description: Indica se lat/lng foi calculado nesta chamada (lazy geocoding)
              properties:
                loja:
                  type: boolean
                cliente:
                  type: boolean

    # ─────────────────────────────────────────────────────────────────────────
    # Errors
    # ─────────────────────────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        error:
          type: string
        detalhes:
          type: string
          nullable: true

    StockValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Estoque insuficiente para um ou mais produtos"
        itens_com_erro:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              descricao:
                type: string
                example: "Café Especial 250g"
              disponivel:
                type: number
                example: 3
              solicitado:
                type: number
                example: 10

    StatusTransitionError:
      type: object
      properties:
        error:
          type: string
          example: "Transição inválida: received → cancelled"
        allowed:
          type: array
          items:
            type: string
          example: []

paths:
  # ──────────────────────────────────────────────────────────────────────────
  # CUSTOMERS
  # ──────────────────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: buscarCliente
      summary: Buscar cliente pelo número de WhatsApp ou ID
      description: |
        Procura um cliente na organização vinculada à `store_id`.
        Ideal para verificar se o cliente já está cadastrado antes de iniciar uma conversa.
      parameters:
        - name: store_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID da loja atendida pelo agente
        - name: whatsapp
          in: query
          schema:
            type: string
          description: "Número do WhatsApp (com DDI). Ex: 5531999990000. Obrigatório se id não for informado."
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: UUID do cliente. Obrigatório se whatsapp não for informado.
      responses:
        "200":
          description: Resultado da busca
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  customer:
                    oneOf:
                      - $ref: "#/components/schemas/Customer"
                      - type: "null"
              examples:
                encontrado:
                  summary: Cliente encontrado
                  value:
                    found: true
                    customer:
                      id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                      nome: "João Silva"
                      whatsapp: "5531999990000"
                      cidade: "Varginha"
                      estado: "MG"
                nao_encontrado:
                  summary: Cliente não encontrado
                  value:
                    found: false
                    customer: null
        "400":
          description: Parâmetros inválidos (store_id ausente ou nenhum filtro informado)
        "401":
          description: Token inválido ou ausente
        "404":
          description: Loja não encontrada

    post:
      operationId: criarOuAtualizarCliente
      summary: Criar ou atualizar cliente
      description: |
        Cria um novo cliente ou atualiza os dados de um existente (upsert por `whatsapp` + organização).
        O geocoding de lat/lng acontece automaticamente via trigger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - store_id
                - nome
                - whatsapp
              properties:
                store_id:
                  type: string
                  format: uuid
                nome:
                  type: string
                  example: João Silva
                whatsapp:
                  type: string
                  example: "5531999990000"
                logradouro:
                  type: string
                numero:
                  type: string
                complemento:
                  type: string
                bairro:
                  type: string
                cidade:
                  type: string
                estado:
                  type: string
                  example: MG
                cep:
                  type: string
                  example: "37062683"
      responses:
        "201":
          description: Cliente criado ou atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: "#/components/schemas/Customer"
        "400":
          description: Campos obrigatórios ausentes
        "401":
          description: Token inválido
        "404":
          description: Loja não encontrada

  # ──────────────────────────────────────────────────────────────────────────
  # PRODUCTS
  # ──────────────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: consultarEstoque
      summary: Consultar produtos em estoque
      description: |
        Busca produtos da organização. Pode filtrar por loja específica (`store_id`) ou retornar
        o catálogo inteiro da org (`organization_id`).

        **Para o agente:** informe `organization_id` **ou** `store_id`. Se ambos forem omitidos, retorna 400.

        Cada produto retorna `store_id` e `store_nome` para identificar a qual loja pertence,
        especialmente útil na busca multi-loja.

        Os resultados são ordenados alfabeticamente por `descricao`.
      parameters:
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            ID da organização. Obrigatório para o agente quando `store_id` não for informado.
            Retorna produtos de todas as lojas da org.
        - name: store_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Filtrar por loja específica (opcional). Quando presente, restringe os resultados
            e inclui o campo `store` na raiz da resposta.
        - name: search
          in: query
          schema:
            type: string
          description: "Busca textual na descrição (case-insensitive)"
        - name: group_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por grupo/categoria
        - name: in_stock
          in: query
          schema:
            type: boolean
            default: false
          description: Se true, retorna apenas produtos com quantidade > 0
      responses:
        "200":
          description: Lista de produtos
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      organization_id:
                        type: string
                        format: uuid
                      store:
                        type: object
                        nullable: true
                        description: Presente apenas quando store_id foi informado
                        properties:
                          id:
                            type: string
                            format: uuid
                          nome:
                            type: string
                      total:
                        type: integer
                      products:
                        type: array
                        items:
                          $ref: "#/components/schemas/Product"
                      groups:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            nome:
                              type: string
                            store_id:
                              type: string
                              format: uuid
              examples:
                org_wide:
                  summary: Todos os produtos da org (sem store_id)
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    total: 2
                    products:
                      - id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                        store_nome: "Varginha"
                        descricao: "Café Especial 250g"
                        unidade_medida: "CX"
                        quantidade: 48
                        valor_venda: 32.90
                        group:
                          id: "uuid"
                          nome: "Cafés"
                      - id: "a1b2c3d4-0000-0000-0000-000000000001"
                        store_id: "ee4d2a74-25fd-4432-91a8-96121c6bf64e"
                        store_nome: "Paraguaçu"
                        descricao: "Produto Teste"
                        unidade_medida: "UN"
                        quantidade: 10
                        valor_venda: 20.00
                        group: null
                    groups:
                      - id: "uuid"
                        nome: "Cafés"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                by_store:
                  summary: Produtos de uma loja específica (com store_id)
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    store:
                      id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                      nome: "Varginha"
                    total: 1
                    products:
                      - id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                        store_nome: "Varginha"
                        descricao: "Café Especial 250g"
                        unidade_medida: "CX"
                        quantidade: 48
                        valor_venda: 32.90
                        group:
                          id: "uuid"
                          nome: "Cafés"
                    groups:
                      - id: "uuid"
                        nome: "Cafés"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
        "400":
          description: "Agente não informou organization_id nem store_id"
        "401":
          description: Token inválido
        "403":
          description: Usuário JWT tentando acessar loja de outra organização
        "404":
          description: Loja não encontrada

  # ──────────────────────────────────────────────────────────────────────────
  # CALCULATE FREIGHT
  # ──────────────────────────────────────────────────────────────────────────
  /calculate-freight:
    post:
      operationId: calcularFrete
      summary: Calcular frete e verificar raio de entrega
      description: |
        Recebe `loja_id` e `cliente_id`, calcula a distância via Haversine
        e retorna o valor do frete com base nas configurações da organização.

        **Lazy geocoding:** se loja ou cliente ainda não têm lat/lng, a função geocodifica
        automaticamente e persiste as coordenadas para chamadas futuras.

        **Lógica de cálculo:**
        1. `distancia_km × valor_por_km` = valor base
        2. Se valor base < `valor_minimo` → usa `valor_minimo`
        3. Se valor do pedido ≥ `frete_gratis_acima_de` → `valor_frete = 0`
        4. Se `dentro_raio = false` → `valor_frete = 0` (não entrega)

        A resposta inclui `customer.whatsapp` para confirmar o número do cliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loja_id
                - cliente_id
              properties:
                loja_id:
                  type: string
                  format: uuid
                cliente_id:
                  type: string
                  format: uuid
            example:
              loja_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              cliente_id: "ee4d2a74-25fd-4432-91a8-96121c6bf64e"
      responses:
        "200":
          description: Resultado do cálculo de frete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreteResult"
              examples:
                dentro_raio:
                  summary: Cliente dentro do raio
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    customer:
                      id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                      nome: "João Silva"
                      whatsapp: "5531999990000"
                    dentro_raio: true
                    distancia_km: 3.24
                    raio_entrega_km: 5.0
                    valor_frete: 9.72
                    frete_gratis: false
                    pedido_minimo_entrega: 30.00
                    frete_gratis_acima_de: 100.00
                    _geocodificado:
                      loja: false
                      cliente: false
                fora_do_raio:
                  summary: Cliente fora do raio
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    customer:
                      id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                      nome: "João Silva"
                      whatsapp: "5531999990000"
                    dentro_raio: false
                    distancia_km: 8.51
                    raio_entrega_km: 5.0
                    valor_frete: 0
                    frete_gratis: false
                    pedido_minimo_entrega: 30.00
                    frete_gratis_acima_de: null
                    _geocodificado:
                      loja: false
                      cliente: true
        "400":
          description: Parâmetros ausentes
        "401":
          description: Token inválido
        "403":
          description: Loja e cliente de organizações diferentes
        "404":
          description: Loja ou cliente não encontrado
        "422":
          description: Não foi possível geocodificar (endereço incompleto)

  # ──────────────────────────────────────────────────────────────────────────
  # ORDERS
  # ──────────────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: consultarPedidos
      summary: Listar pedidos ou buscar pedido por ID
      description: |
        Retorna lista paginada de pedidos de uma loja, ou um pedido específico com todos os detalhes.

        Para buscar um pedido único (com itens e produtos), passe apenas `id` como parâmetro.
        Para listar, passe `store_id` e os filtros desejados.

        Todas as respostas incluem `organization_id`, `instance_name` e `customers.whatsapp`.
      parameters:
        - name: store_id
          in: query
          schema:
            type: string
            format: uuid
          description: ID da loja. Obrigatório para listagem.
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: UUID do pedido. Retorna pedido único com todos os detalhes (itens + produtos).
        - name: status
          in: query
          schema:
            type: string
            enum: [open, accepted, shipped, received, cancelled]
          description: Filtrar por status
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por cliente
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: "Data inicial (ex: 2026-03-01)"
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: "Data final (ex: 2026-03-31)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Lista de pedidos ou pedido único
          content:
            application/json:
              schema:
                oneOf:
                  - allOf:
                      - $ref: "#/components/schemas/OrgContext"
                      - type: object
                        description: Listagem paginada
                        properties:
                          orders:
                            type: array
                            items:
                              $ref: "#/components/schemas/Order"
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                  - allOf:
                      - $ref: "#/components/schemas/OrgContext"
                      - type: object
                        description: Pedido único (quando id é informado)
                        properties:
                          order:
                            $ref: "#/components/schemas/Order"
              examples:
                listagem:
                  summary: Listagem paginada
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
