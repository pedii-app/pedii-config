openapi: 3.1.0
info:
  title: Pedii Agent API
  version: 3.6.0
  description: |
    APIs utilizadas pelo agente de vendas WhatsApp do Pedii.

    ## Autenticação
    Existem dois contextos de autenticação com headers distintos:

    **Agente → Pedii (chamadas de saída):** use `Authorization: Bearer`
    ```
    Authorization: Bearer <AGENT_API_KEY>
    ```

    **Pedii → Agente (webhooks recebidos):** use `x-api-key`
    ```
    x-api-key: <AGENT_API_KEY>
    x-internal-secret: <INTERNAL_WEBHOOK_SECRET>
    ```

    A `AGENT_API_KEY` é a mesma nos dois sentidos — a diferença é apenas o header usado.
    Armazenada no GCP Secret Manager e como secret no Supabase. Nunca commitar.

    ## Base URL
    ```
    https://qiqwylcjoyztqebqglok.supabase.co/functions/v1
    ```

    ## Campos presentes em todas as respostas
    Toda resposta bem-sucedida inclui:
    - `organization_id` (uuid): ID da organização (tenant raiz do Pedii)
    - `instance_name` (string | null): Nome da instância WhatsApp conectada na Evolution API

    ## Webhooks recebidos pelo agente
    O Pedii envia eventos ao agente quando ações ocorrem no dashboard do lojista.
    O agente deve expor um endpoint HTTP para receber esses eventos.
    Ver seção `webhooks` ao final deste documento.

servers:
  - url: https://qiqwylcjoyztqebqglok.supabase.co/functions/v1
    description: Supabase Edge Functions (produção)

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: AGENT_API_KEY armazenada no GCP Secret Manager

  schemas:
    # ─────────────────────────────────────────────────────────────────────────
    # Envelope de contexto presente em todas as respostas
    # ─────────────────────────────────────────────────────────────────────────
    OrgContext:
      type: object
      description: Campos de contexto presentes em todas as respostas bem-sucedidas
      properties:
        organization_id:
          type: string
          format: uuid
          description: ID da organização (tenant raiz)
          example: "f988b66e-21e6-48d5-a90d-08f746600763"
        instance_name:
          type: string
          nullable: true
          description: Nome da instância WhatsApp conectada na Evolution API
          example: "pedii_f988b66e"

    # ─────────────────────────────────────────────────────────────────────────
    # Customer
    # ─────────────────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
          example: João Silva
        whatsapp:
          type: string
          description: Número normalizado (somente dígitos, com DDI)
          example: "5531999990000"
        cep:
          type: string
          example: "37062683"
        logradouro:
          type: string
        numero:
          type: string
        complemento:
          type: string
          nullable: true
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
          example: MG
        lat:
          type: number
          format: double
          nullable: true
        lng:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time

    CustomerSummary:
      type: object
      description: Resumo do cliente embutido nas respostas de pedido e frete
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        whatsapp:
          type: string
          description: Número normalizado (somente dígitos)
          example: "5531999990000"

    # ─────────────────────────────────────────────────────────────────────────
    # Product
    # ─────────────────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
          description: ID da loja à qual o produto pertence
        store_nome:
          type: string
          nullable: true
          description: Nome da loja (apelido ou razão social). Útil na busca multi-loja.
          example: "Varginha"
        legacy_id:
          type: string
          nullable: true
          description: ID do sistema legado (ERP/PDV). Nulo se não integrado.
        descricao:
          type: string
          example: Café Especial 250g
        unidade_medida:
          type: string
          enum: [UN, KG, G, LT, ML, MT, CM, CX, PC, DZ, PR]
        quantidade:
          type: number
          description: Quantidade disponível em estoque
          example: 48.0
        valor_venda:
          type: number
          format: double
          description: Preço de venda em BRL
          example: 32.90
        updated_at:
          type: string
          format: date-time
        group:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
              example: Cafés

    # ─────────────────────────────────────────────────────────────────────────
    # Order
    # ─────────────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        quantity:
          type: number
          example: 2
        unit_price:
          type: number
          format: double
          example: 32.90
        subtotal:
          type: number
          format: double
          example: 65.80
        created_at:
          type: string
          format: date-time
        products:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            descricao:
              type: string
            unidade_medida:
              type: string
            legacy_id:
              type: string
              nullable: true

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, accepted, shipped, received, cancelled]
          description: |
            Máquina de estados:
            open → accepted | cancelled
            accepted → shipped | cancelled
            shipped → received | cancelled
            received → (terminal)
            cancelled → (terminal)
        notes:
          type: string
          nullable: true
        total:
          type: number
          format: double
          description: Total dos itens + frete (calculado automaticamente)
        shipping_value:
          type: number
          format: double
          description: Valor do frete em BRL
        shipping_distance_km:
          type: number
          format: double
          nullable: true
        shipping_within_radius:
          type: boolean
          nullable: true
        agent_created:
          type: boolean
          description: True se o pedido foi criado pelo agente via API
        status_changed_by_agent:
          type: boolean
          description: True se o último update de status foi feito pelo agente (previne loop de webhook)
        awaiting_customer_approval:
          type: boolean
          default: false
          description: |
            True quando o atendente editou os itens do pedido (edit_items) e o agente ainda
            não registrou confirmação do cliente (customer_approved). Bloqueia a transição
            open → accepted no dashboard até ser zerado.
        created_by:
          type: string
          format: uuid
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        shipped_at:
          type: string
          format: date-time
          nullable: true
        received_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        stores:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            razao_social:
              type: string
            apelido:
              type: string
        customers:
          $ref: "#/components/schemas/CustomerSummary"
        order_items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    # ─────────────────────────────────────────────────────────────────────────
    # Freight
    # ─────────────────────────────────────────────────────────────────────────
    FreteResult:
      allOf:
        - $ref: "#/components/schemas/OrgContext"
        - type: object
          properties:
            customer:
              $ref: "#/components/schemas/CustomerSummary"
            dentro_raio:
              type: boolean
              description: Se o cliente está dentro do raio de entrega da loja
            distancia_km:
              type: number
              description: Distância em km entre loja e cliente (Haversine)
              example: 3.24
            raio_entrega_km:
              type: number
              description: Raio máximo de entrega configurado na loja
              example: 5.0
            valor_frete:
              type: number
              description: Valor do frete em BRL. Zero se frete grátis ou fora do raio.
              example: 9.72
            frete_gratis:
              type: boolean
              description: True se o frete foi zerado por regra de negócio
            pedido_minimo_entrega:
              type: number
              description: Valor mínimo do pedido para habilitar entrega. Zero = sem mínimo.
              example: 30.00
            frete_gratis_acima_de:
              type: number
              nullable: true
              description: Valor do pedido para ganhar frete grátis. Null = regra desativada.
              example: 100.00
            _geocodificado:
              type: object
              description: Indica se lat/lng foi calculado nesta chamada (lazy geocoding)
              properties:
                loja:
                  type: boolean
                cliente:
                  type: boolean

    # ─────────────────────────────────────────────────────────────────────────
    # Errors
    # ─────────────────────────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        error:
          type: string
        detalhes:
          type: string
          nullable: true

    StockValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Estoque insuficiente para um ou mais produtos"
        itens_com_erro:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              descricao:
                type: string
                example: "Café Especial 250g"
              disponivel:
                type: number
                example: 3
              solicitado:
                type: number
                example: 10

    NearestStore:
      type: object
      description: Loja com distância calculada em relação ao CEP do cliente
      properties:
        id:
          type: string
          format: uuid
          description: ID da loja no Pedii (usar como store_id nas chamadas seguintes)
        nome:
          type: string
          description: Apelido da loja ou razão social se apelido não configurado
          example: Varginha
        razao_social:
          type: string
          example: TM Farma - Varginha
        apelido:
          type: string
          nullable: true
          example: Varginha
        endereco:
          type: object
          properties:
            logradouro:
              type: string
              nullable: true
            numero:
              type: string
              nullable: true
            bairro:
              type: string
              nullable: true
            cidade:
              type: string
            estado:
              type: string
            cep:
              type: string
              nullable: true
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        raio_entrega_km:
          type: number
          nullable: true
          description: Raio máximo de entrega configurado na loja. Null se não configurado.
          example: 5.0
        distancia_km:
          type: number
          format: double
          description: Distância em km entre o CEP do cliente e a loja (Haversine)
          example: 0.42
        dentro_raio:
          type: boolean
          nullable: true
          description: |
            True se distancia_km ≤ raio_entrega_km.
            Null se a loja não tem raio_entrega_km configurado.
        is_currently_open:
          type: boolean
          description: |
            True se a loja está aberta no momento da consulta (horário BRT UTC-3).
            Considera fechamento temporário e grade horária configurada.
          example: true
        store_status:
          type: string
          enum:
            - open
            - closed_temporary
            - closed_schedule
            - no_hours_configured
          description: |
            Status de funcionamento atual da loja:
            - `open`: loja aberta no momento
            - `closed_schedule`: fora do horário ou dia marcado como fechado
            - `closed_temporary`: fechamento de emergência ativo (independente do horário)
            - `no_hours_configured`: nenhuma grade horária cadastrada — tratada como aberta
          example: open
        temporarily_closed_reason:
          type: string
          nullable: true
          description: Motivo do fechamento temporário informado pelo lojista. Null se não há fechamento ativo ou se nenhum motivo foi informado.
          example: null

    StatusTransitionError:
      type: object
      properties:
        error:
          type: string
          example: "Transição inválida: received → cancelled"
        allowed:
          type: array
          items:
            type: string
          example: []

    AwaitingCustomerApprovalError:
      type: object
      description: |
        Retornado quando se tenta aceitar um pedido (open → accepted) que está
        aguardando confirmação do cliente após edição de itens pelo atendente.
        O agente deve chamar `customer_approved` após o cliente confirmar.
      properties:
        error:
          type: string
          example: "Este pedido foi modificado e aguarda aprovação do cliente final antes de ser aceito."
        code:
          type: string
          example: "AWAITING_CUSTOMER_APPROVAL"

paths:
  # ──────────────────────────────────────────────────────────────────────────
  # RESOLVE ORG — primeira chamada de toda conversa
  # ──────────────────────────────────────────────────────────────────────────
  /resolve-org:
    get:
      operationId: resolverOrganizacao
      summary: Resolver organization_id a partir do instance_name da Evolution API
      description: |
        **Primeira chamada de toda conversa.**

        Ao receber uma mensagem de um cliente no WhatsApp, o agente só conhece o
        `instance_name` da instância Evolution. Esta rota converte esse nome no
        `organization_id` do tenant Pedii correspondente.

        O `organization_id` retornado deve ser armazenado no contexto da conversa
        e passado em todas as chamadas subsequentes (`/customers`, `/products`,
        `/calculate-freight`, `/orders`).

        **Rota exclusiva do agente** — não aceita JWT de usuário (retorna 401).

        Se `found: false` (404), a instância não está cadastrada no Pedii e o
        agente não deve prosseguir com o fluxo de vendas.
      parameters:
        - name: instance_name
          in: query
          required: true
          schema:
            type: string
          description: Nome exato da instância no Evolution API
          example: "pedii_f988b66e"
      responses:
        "200":
          description: Instância encontrada — retorna o organization_id do tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                    example: true
                  organization_id:
                    type: string
                    format: uuid
                    description: ID da organização (tenant raiz) a ser usado em todas as chamadas
                    example: "f988b66e-21e6-48d5-a90d-08f746600763"
                  instance_name:
                    type: string
                    example: "pedii_f988b66e"
                  phone_number:
                    type: string
                    nullable: true
                    description: Número de telefone conectado à instância (com DDI)
                    example: "5531999990000"
                  instance_status:
                    type: string
                    nullable: true
                    enum: [connecting, connected, disconnected, qrcode]
                    description: Status atual da instância no Evolution API
                    example: "connected"
              examples:
                encontrada:
                  summary: Instância encontrada
                  value:
                    found: true
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    phone_number: "5531999990000"
                    instance_status: "connected"
        "400":
          description: Parâmetro instance_name ausente
        "401":
          description: Token inválido ou ausente (somente AGENT_API_KEY aceita)
        "404":
          description: Instância não encontrada no Pedii
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                    example: false
                  organization_id:
                    type: "null"
                  instance_name:
                    type: string
              example:
                found: false
                organization_id: null
                instance_name: "instancia_desconhecida"
        "500":
          description: Erro interno

  # ──────────────────────────────────────────────────────────────────────────
  # ──────────────────────────────────────────────────────────────────────────
  # NEAREST STORES
  # ──────────────────────────────────────────────────────────────────────────
  /nearest-stores:
    get:
      operationId: lojasProximas
      summary: Lojas mais próximas de um CEP
      description: |
        Geocodifica o CEP do cliente e retorna até 3 lojas da organização com menor distância
        **dentro do raio de atendimento**, ordenadas por `distancia_km` crescente.

        **Fluxo interno de geocoding (3 etapas):**
        1. **ViaCEP** (`viacep.com.br`) — resolve o CEP para logradouro, bairro, cidade e estado.
           Se o CEP não existir nos Correios, retorna 422 imediatamente.
        2. **Nominatim** — geocodifica com fallbacks progressivos:
           - `"Logradouro, Bairro, Cidade, UF, Brasil"` (mais preciso)
           - `"Bairro, Cidade, UF, Brasil"`
           - `"Cidade, UF, Brasil"` (mínimo viável para Haversine)
        3. Usa a primeira tentativa bem-sucedida.

        **Geocoding lazy de lojas:** se uma loja ainda não tem `lat/lng` cadastrada, é geocodificada
        nesta chamada e as coordenadas são persistidas para uso futuro.

        **Filtragem por raio:** somente lojas onde `distancia_km ≤ raio_entrega_km` são retornadas.
        Lojas sem `raio_entrega_km` configurado são incluídas sem restrição de distância.

        **Rota exclusiva do agente** — aceita somente `AGENT_API_KEY` (sem JWT de usuário).
        Aceita `GET` (query string) ou `POST` (body JSON).
      parameters:
        - name: cep
          in: query
          required: true
          schema:
            type: string
          description: "CEP do cliente (8 dígitos, com ou sem hífen). Ex: 37062683"
        - name: organization_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: ID da organização (obtido via GET /resolve-org)
      responses:
        "200":
          description: Lista das 3 lojas mais próximas
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization_id:
                    type: string
                    format: uuid
                  cep:
                    type: string
                    example: "37062683"
                  cliente_coords:
                    type: object
                    description: Coordenadas obtidas via geocodificação do CEP
                    properties:
                      lat:
                        type: number
                        format: double
                        example: -21.5512
                      lng:
                        type: number
                        format: double
                        example: -45.4333
                  total_lojas:
                    type: integer
                    description: Total de lojas da organização
                  lojas_sem_coordenadas:
                    type: integer
                    description: Lojas excluídas do ranking por não terem sido geocodificadas
                  nearest_stores:
                    type: array
                    description: |
                      Até 3 lojas dentro do raio de atendimento, ordenadas por distancia_km crescente.
                      Vazio se o CEP estiver fora do raio de todas as lojas.
                    items:
                      $ref: "#/components/schemas/NearestStore"
                  message:
                    type: string
                    description: |
                      Presente apenas quando nearest_stores está vazio. Indica que o cliente
                      está fora do raio de entrega de todas as lojas da organização.
                    example: "Nenhuma loja atende o CEP informado. O cliente está fora do raio de entrega de todas as lojas."
              example:
                organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                cep: "37062683"
                cliente_coords:
                  lat: -21.5512
                  lng: -45.4333
                total_lojas: 3
                lojas_sem_coordenadas: 0
                nearest_stores:
                  - id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                    nome: Varginha
                    razao_social: TM Farma - Varginha
                    apelido: Varginha
                    endereco:
                      logradouro: Rua Wenceslau Braz
                      numero: "100"
                      bairro: Centro
                      cidade: Varginha
                      estado: MG
                      cep: "37002000"
                    lat: -21.5510
                    lng: -45.4300
                    raio_entrega_km: 5.0
                    distancia_km: 0.42
                    dentro_raio: true
                  - id: "ee4d2a74-25fd-4432-91a8-96121c6bf64e"
                    nome: Paraguaçu
                    razao_social: TM Farma - Paraguaçu
                    apelido: Paraguaçu
                    endereco:
                      logradouro: null
                      numero: null
                      bairro: null
                      cidade: Paraguaçu
                      estado: MG
                      cep: "37280000"
                    lat: -21.5400
                    lng: -45.7200
                    raio_entrega_km: 10.0
                    distancia_km: 28.15
                    dentro_raio: false
        "400":
          description: |
            Parâmetros ausentes ou CEP inválido (menos de 8 dígitos após normalização)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                parametros_ausentes:
                  summary: Parâmetros obrigatórios ausentes
                  value:
                    error: "Parâmetros obrigatórios: cep, organization_id"
                cep_invalido:
                  summary: CEP com formato inválido
                  value:
                    error: "CEP inválido. Informe 8 dígitos."
        "401":
          description: Token inválido ou ausente
        "404":
          description: Nenhuma loja encontrada para a organização
        "422":
          description: CEP não pôde ser geocodificado (inexistente ou inválido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                cep_nao_encontrado:
                  summary: CEP não existe nos Correios (ViaCEP retornou erro)
                  value:
                    error: "CEP não encontrado. Verifique se o CEP é válido."
                    cep: "00000000"
                geocoding_falhou:
                  summary: CEP existe mas não geocodificável pelo Nominatim
                  value:
                    error: "Não foi possível geocodificar o CEP informado. Verifique se a cidade está correta."
                    cep: "37068180"
                    endereco_resolvido: "Rua Heleno Crispim Maciel, Jardim Ribeiro, Varginha, MG, Brasil"

    post:
      operationId: lojasProximasPost
      summary: Lojas mais próximas de um CEP (via body)
      description: |
        Versão POST de `/nearest-stores`. Mesma lógica — útil quando o CEP contém caracteres
        especiais que dificultam a query string.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cep
                - organization_id
              properties:
                cep:
                  type: string
                  example: "37062-683"
                organization_id:
                  type: string
                  format: uuid
            example:
              cep: "37062-683"
              organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
      responses:
        "200":
          description: Lista das 3 lojas mais próximas
          content:
            application/json:
              schema:
                type: object
                properties:
                  nearest_stores:
                    type: array
                    items:
                      $ref: "#/components/schemas/NearestStore"
        "400":
          description: Parâmetros ausentes ou CEP inválido
        "401":
          description: Token inválido
        "404":
          description: Nenhuma loja encontrada
        "422":
          description: CEP não geocodificável

  # CUSTOMERS
  # ──────────────────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: buscarCliente
      summary: Buscar cliente pelo número de WhatsApp ou ID
      description: |
        Procura um cliente na organização. O cliente pertence à **organização**, não à loja,
        portanto use `organization_id` diretamente (obtido via `GET /resolve-org`).

        `store_id` é aceito como alternativa retrocompatível: quando informado, a função
        resolve o `organization_id` internamente via lookup na tabela `stores`.
      parameters:
        - name: organization_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            ID da organização (obtido via /resolve-org). **Campo canônico — preferir ao store_id.**
            Obrigatório se store_id não for informado.
        - name: store_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Alternativa retrocompatível ao organization_id. Quando informado, o organization_id
            é resolvido internamente. Obrigatório se organization_id não for informado.
        - name: whatsapp
          in: query
          schema:
            type: string
          description: "Número do WhatsApp (com DDI). Ex: 5531999990000. Obrigatório se id não for informado."
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: UUID do cliente. Obrigatório se whatsapp não for informado.
      responses:
        "200":
          description: Resultado da busca
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  customer:
                    oneOf:
                      - $ref: "#/components/schemas/Customer"
                      - type: "null"
              examples:
                encontrado:
                  summary: Cliente encontrado (usando organization_id)
                  value:
                    found: true
                    customer:
                      id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                      nome: "João Silva"
                      whatsapp: "5531999990000"
                      cidade: "Varginha"
                      estado: "MG"
                nao_encontrado:
                  summary: Cliente não encontrado
                  value:
                    found: false
                    customer: null
        "400":
          description: "Parâmetros inválidos: organization_id e store_id ausentes, ou nenhum filtro (whatsapp/id) informado"
        "401":
          description: Token inválido ou ausente
        "404":
          description: "Loja não encontrada (apenas quando store_id for usado no lugar de organization_id)"

    post:
      operationId: criarOuAtualizarCliente
      summary: Criar ou atualizar cliente
      description: |
        Cria um novo cliente ou atualiza os dados de um existente (upsert por `whatsapp` + `organization_id`).
        O geocoding de lat/lng acontece automaticamente via trigger.

        Use `organization_id` diretamente (campo canônico). `store_id` é aceito como alternativa
        retrocompatível — ao menos um dos dois deve ser informado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - whatsapp
              properties:
                organization_id:
                  type: string
                  format: uuid
                  description: |
                    ID da organização (obtido via /resolve-org). Campo canônico.
                    Obrigatório se store_id não for informado.
                  example: "f988b66e-21e6-48d5-a90d-08f746600763"
                store_id:
                  type: string
                  format: uuid
                  description: |
                    Alternativa retrocompatível. Obrigatório se organization_id não for informado.
                nome:
                  type: string
                  example: João Silva
                whatsapp:
                  type: string
                  example: "5531999990000"
                logradouro:
                  type: string
                numero:
                  type: string
                complemento:
                  type: string
                bairro:
                  type: string
                cidade:
                  type: string
                estado:
                  type: string
                  example: MG
                cep:
                  type: string
                  example: "37062683"
      responses:
        "201":
          description: Cliente criado ou atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer:
                    $ref: "#/components/schemas/Customer"
        "400":
          description: Campos obrigatórios ausentes
        "401":
          description: Token inválido
        "404":
          description: Loja não encontrada

  # ──────────────────────────────────────────────────────────────────────────
  # PRODUCTS
  # ──────────────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: consultarEstoque
      summary: Consultar produtos em estoque
      description: |
        Busca produtos da organização. Pode filtrar por loja específica (`store_id`) ou retornar
        o catálogo inteiro da org (`organization_id`).

        **Para o agente:** informe `organization_id` **ou** `store_id`. Se ambos forem omitidos, retorna 400.

        Cada produto retorna `store_id` e `store_nome` para identificar a qual loja pertence,
        especialmente útil na busca multi-loja.

        Os resultados são ordenados alfabeticamente por `descricao`.
      parameters:
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            ID da organização. Obrigatório para o agente quando `store_id` não for informado.
            Retorna produtos de todas as lojas da org.
        - name: store_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Filtrar por loja específica (opcional). Quando presente, restringe os resultados
            e inclui o campo `store` na raiz da resposta.
        - name: search
          in: query
          schema:
            type: string
          description: "Busca textual na descrição (case-insensitive)"
        - name: group_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por grupo/categoria
        - name: in_stock
          in: query
          schema:
            type: boolean
            default: false
          description: Se true, retorna apenas produtos com quantidade > 0
      responses:
        "200":
          description: Lista de produtos
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      organization_id:
                        type: string
                        format: uuid
                      store:
                        type: object
                        nullable: true
                        description: Presente apenas quando store_id foi informado
                        properties:
                          id:
                            type: string
                            format: uuid
                          nome:
                            type: string
                      total:
                        type: integer
                      products:
                        type: array
                        items:
                          $ref: "#/components/schemas/Product"
                      groups:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            nome:
                              type: string
                            store_id:
                              type: string
                              format: uuid
              examples:
                org_wide:
                  summary: Todos os produtos da org (sem store_id)
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    total: 2
                    products:
                      - id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                        store_nome: "Varginha"
                        descricao: "Café Especial 250g"
                        unidade_medida: "CX"
                        quantidade: 48
                        valor_venda: 32.90
                        group:
                          id: "uuid"
                          nome: "Cafés"
                      - id: "a1b2c3d4-0000-0000-0000-000000000001"
                        store_id: "ee4d2a74-25fd-4432-91a8-96121c6bf64e"
                        store_nome: "Paraguaçu"
                        descricao: "Produto Teste"
                        unidade_medida: "UN"
                        quantidade: 10
                        valor_venda: 20.00
                        group: null
                    groups:
                      - id: "uuid"
                        nome: "Cafés"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                by_store:
                  summary: Produtos de uma loja específica (com store_id)
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    store:
                      id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                      nome: "Varginha"
                    total: 1
                    products:
                      - id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                        store_nome: "Varginha"
                        descricao: "Café Especial 250g"
                        unidade_medida: "CX"
                        quantidade: 48
                        valor_venda: 32.90
                        group:
                          id: "uuid"
                          nome: "Cafés"
                    groups:
                      - id: "uuid"
                        nome: "Cafés"
                        store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
        "400":
          description: "Agente não informou organization_id nem store_id"
        "401":
          description: Token inválido
        "403":
          description: Usuário JWT tentando acessar loja de outra organização
        "404":
          description: Loja não encontrada

  # ──────────────────────────────────────────────────────────────────────────
  # CALCULATE FREIGHT
  # ──────────────────────────────────────────────────────────────────────────
  /calculate-freight:
    post:
      operationId: calcularFrete
      summary: Calcular frete e verificar raio de entrega
      description: |
        Recebe `loja_id` e `cliente_id`, calcula a distância via Haversine
        e retorna o valor do frete com base nas configurações da organização.

        **Lazy geocoding:** se loja ou cliente ainda não têm lat/lng, a função geocodifica
        automaticamente e persiste as coordenadas para chamadas futuras.

        **Lógica de cálculo:**
        1. `distancia_km × valor_por_km` = valor base
        2. Se valor base < `valor_minimo` → usa `valor_minimo`
        3. Se valor do pedido ≥ `frete_gratis_acima_de` → `valor_frete = 0`
        4. Se `dentro_raio = false` → `valor_frete = 0` (não entrega)

        A resposta inclui `customer.whatsapp` para confirmar o número do cliente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loja_id
                - cliente_id
              properties:
                loja_id:
                  type: string
                  format: uuid
                cliente_id:
                  type: string
                  format: uuid
            example:
              loja_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              cliente_id: "ee4d2a74-25fd-4432-91a8-96121c6bf64e"
      responses:
        "200":
          description: Resultado do cálculo de frete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreteResult"
              examples:
                dentro_raio:
                  summary: Cliente dentro do raio
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    customer:
                      id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                      nome: "João Silva"
                      whatsapp: "5531999990000"
                    dentro_raio: true
                    distancia_km: 3.24
                    raio_entrega_km: 5.0
                    valor_frete: 9.72
                    frete_gratis: false
                    pedido_minimo_entrega: 30.00
                    frete_gratis_acima_de: 100.00
                    _geocodificado:
                      loja: false
                      cliente: false
                fora_do_raio:
                  summary: Cliente fora do raio
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    customer:
                      id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                      nome: "João Silva"
                      whatsapp: "5531999990000"
                    dentro_raio: false
                    distancia_km: 8.51
                    raio_entrega_km: 5.0
                    valor_frete: 0
                    frete_gratis: false
                    pedido_minimo_entrega: 30.00
                    frete_gratis_acima_de: null
                    _geocodificado:
                      loja: false
                      cliente: true
        "400":
          description: Parâmetros ausentes
        "401":
          description: Token inválido
        "403":
          description: Loja e cliente de organizações diferentes
        "404":
          description: Loja ou cliente não encontrado
        "422":
          description: Não foi possível geocodificar (endereço incompleto)

  # ──────────────────────────────────────────────────────────────────────────
  # ORDERS
  # ──────────────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: consultarPedidos
      summary: Listar pedidos ou buscar pedido por ID
      description: |
        Retorna lista paginada de pedidos de uma loja, ou um pedido específico com todos os detalhes.

        Para buscar um pedido único (com itens e produtos), passe apenas `id` como parâmetro.
        Para listar, passe `store_id` e os filtros desejados.

        Todas as respostas incluem `organization_id`, `instance_name` e `customers.whatsapp`.
      parameters:
        - name: store_id
          in: query
          schema:
            type: string
            format: uuid
          description: ID da loja. Obrigatório para listagem.
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: UUID do pedido. Retorna pedido único com todos os detalhes (itens + produtos).
        - name: status
          in: query
          schema:
            type: string
            enum: [open, accepted, shipped, received, cancelled]
          description: Filtrar por status
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por cliente
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: "Data inicial (ex: 2026-03-01)"
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: "Data final (ex: 2026-03-31)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Lista de pedidos ou pedido único
          content:
            application/json:
              schema:
                oneOf:
                  - allOf:
                      - $ref: "#/components/schemas/OrgContext"
                      - type: object
                        description: Listagem paginada
                        properties:
                          orders:
                            type: array
                            items:
                              $ref: "#/components/schemas/Order"
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                  - allOf:
                      - $ref: "#/components/schemas/OrgContext"
                      - type: object
                        description: Pedido único (quando id é informado)
                        properties:
                          order:
                            $ref: "#/components/schemas/Order"
              examples:
                listagem:
                  summary: Listagem paginada
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    orders:
                      - id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                        status: open
                        total: 310.00
                        shipping_value: 10.00
                        agent_created: true
                        created_at: "2026-03-20T14:53:00Z"
                        stores:
                          id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                          apelido: Paraguaçu
                        customers:
                          id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                          nome: Eloá Mariane da Luz
                          whatsapp: "35982721736"
                    total: 1
                    page: 1
                    limit: 50
                pedido_unico:
                  summary: Pedido único com itens
                  value:
                    organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
                    instance_name: "pedii_f988b66e"
                    order:
                      id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                      status: accepted
                      total: 310.00
                      shipping_value: 10.00
                      shipping_distance_km: 3.24
                      shipping_within_radius: true
                      agent_created: true
                      accepted_at: "2026-03-20T15:10:00Z"
                      stores:
                        id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                        apelido: Paraguaçu
                      customers:
                        id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                        nome: Eloá Mariane da Luz
                        whatsapp: "35982721736"
                      order_items:
                        - id: "3026e0e8-2f9f-4381-842d-054d01db7a40"
                          quantity: 15
                          unit_price: 20.00
                          subtotal: 300.00
                          products:
                            descricao: Produto Teste Paraguaçu
                            unidade_medida: UN
        "400":
          description: store_id não informado (listagem)
        "401":
          description: Token inválido
        "404":
          description: Pedido não encontrado

    post:
      operationId: criarPedido
      summary: Criar pedido
      description: |
        Registra um novo pedido no dashboard do lojista.
        Pode incluir os itens já na criação (recomendado) ou adicioná-los depois via PATCH.

        O campo `shipping_*` deve ser preenchido com o resultado de `POST /calculate-freight`.
        O total do pedido é calculado automaticamente pelo banco (itens + frete).

        **Validação de estoque:** se qualquer item tiver quantidade superior ao estoque disponível,
        retorna 422 com a lista de itens com erro. A criação é bloqueada até o estoque ser suficiente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - store_id
                - customer_id
              properties:
                store_id:
                  type: string
                  format: uuid
                customer_id:
                  type: string
                  format: uuid
                notes:
                  type: string
                  nullable: true
                  description: Observações do pedido (instruções de entrega, referência, etc.)
                shipping_value:
                  type: number
                  format: double
                  default: 0
                  description: Valor do frete em BRL (obtido via /calculate-freight)
                shipping_distance_km:
                  type: number
                  format: double
                  nullable: true
                shipping_within_radius:
                  type: boolean
                  nullable: true
                items:
                  type: array
                  description: Itens do pedido (opcional na criação, pode ser adicionado via PATCH)
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                        example: 2
                      unit_price:
                        type: number
                        format: double
                        example: 32.90
            example:
              store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
              customer_id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
              notes: "Entregar no período da tarde"
              shipping_value: 9.72
              shipping_distance_km: 3.24
              shipping_within_radius: true
              items:
                - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                  quantity: 2
                  unit_price: 32.90
      responses:
        "201":
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OrgContext"
                  - type: object
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
        "400":
          description: Campos obrigatórios ausentes
        "401":
          description: Token inválido
        "404":
          description: Loja ou cliente não encontrado
        "422":
          description: |
            Erros de validação. Possíveis `code`:
            - **sem código** — estoque insuficiente
            - `STORE_TEMPORARILY_CLOSED` — loja em fechamento de emergência
            - `STORE_CLOSED_TODAY` — loja sem atendimento no dia atual
            - `STORE_OUTSIDE_HOURS` — pedido fora do horário de funcionamento configurado
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StockValidationError"
                  - type: object
                    description: Loja fechada temporariamente
                    properties:
                      error:
                        type: string
                        example: "A loja está temporariamente fechada e não está aceitando pedidos."
                      code:
                        type: string
                        example: STORE_TEMPORARILY_CLOSED
                      reason:
                        type: string
                        nullable: true
                        example: "Falta de energia"
                  - type: object
                    description: Loja sem atendimento hoje
                    properties:
                      error:
                        type: string
                        example: "A loja não tem atendimento hoje."
                      code:
                        type: string
                        example: STORE_CLOSED_TODAY
                  - type: object
                    description: Pedido fora do horário de funcionamento
                    properties:
                      error:
                        type: string
                        example: "A loja está fora do horário de atendimento. Atendimento entre 08:00 e 18:00."
                      code:
                        type: string
                        example: STORE_OUTSIDE_HOURS
                      open_time:
                        type: string
                        example: "08:00"
                      close_time:
                        type: string
                        example: "18:00"
              examples:
                estoque_insuficiente:
                  summary: Estoque insuficiente
                  value:
                    error: "Estoque insuficiente para um ou mais produtos"
                    itens_com_erro:
                      - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        descricao: "Café Especial 250g"
                        disponivel: 3
                        solicitado: 10
                loja_fechada_temporariamente:
                  summary: Fechamento temporário ativo
                  value:
                    error: "A loja está temporariamente fechada e não está aceitando pedidos."
                    code: STORE_TEMPORARILY_CLOSED
                    reason: "Falta de energia"
                loja_fechada_hoje:
                  summary: Loja sem atendimento hoje
                  value:
                    error: "A loja não tem atendimento hoje."
                    code: STORE_CLOSED_TODAY
                fora_do_horario:
                  summary: Fora do horário de funcionamento
                  value:
                    error: "A loja está fora do horário de atendimento. Atendimento entre 08:00 e 18:00."
                    code: STORE_OUTSIDE_HOURS
                    open_time: "08:00"
                    close_time: "18:00"

    patch:
      operationId: atualizarPedido
      summary: Atualizar status ou editar itens do pedido
      description: |
        Quatro ações disponíveis via campo `action`:

        ---

        **`update_status`** (padrão): Avança o status do pedido conforme a máquina de estados.
        Mudanças feitas pelo agente **não** disparam o webhook `order.status_changed` (evita loop).
        Transições válidas:
        - `open → accepted | cancelled`
        - `accepted → shipped | cancelled`
        - `shipped → received | cancelled`
        - `received` e `cancelled` são estados terminais

        ⚠️ A transição `open → accepted` é bloqueada enquanto `awaiting_customer_approval = true`.
        Retorna 422 com code `AWAITING_CUSTOMER_APPROVAL`. O atendente só pode aceitar após o agente
        chamar `customer_approved`.

        ---

        **`add_items`**: Adiciona novos itens a um pedido `open` ou `accepted`.
        Valida estoque antes de inserir. O total é recalculado automaticamente.

        ---

        **`edit_items`**: Edição completa de itens (adicionar, remover, ajustar quantidades)
        em uma única chamada atômica. Disponível somente para pedidos `open` ou `accepted`.

        Após a operação:
        1. Seta `awaiting_customer_approval = true` no pedido — bloqueia o aceite pelo atendente.
        2. Dispara o webhook `order.items_updated` ao agente com o resumo das alterações
           e o pedido completo atualizado.

        Casos de uso:
        - Atendente remove item sem estoque antes de aceitar
        - Atendente substitui produto por similar disponível
        - Atendente ajusta quantidade de um item

        ---

        **`customer_approved`**: Registra que o cliente aceitou os ajustes feitos pelo atendente.
        **Exclusivo do agente** — retorna 403 se chamado com JWT de usuário.

        Zera `awaiting_customer_approval → false`, liberando o atendente para aceitar o pedido.
        O dashboard atualiza automaticamente via Supabase Realtime.
        Só funciona em pedidos com `status = open`.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: ID do pedido
                action:
                  type: string
                  enum: [update_status, add_items, edit_items, customer_approved]
                  default: update_status
                # update_status
                status:
                  type: string
                  enum: [accepted, shipped, received, cancelled]
                  description: "Novo status (obrigatório para action=update_status)"
                # add_items
                items:
                  type: array
                  description: "Itens a adicionar (obrigatório para action=add_items)"
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                      unit_price:
                        type: number
                        format: double
                # edit_items
                items_to_add:
                  type: array
                  description: "Novos itens a inserir no pedido (action=edit_items)"
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                      unit_price:
                        type: number
                        format: double
                items_to_remove:
                  type: array
                  description: "IDs de order_items a remover (action=edit_items). Estoque é restaurado."
                  items:
                    type: string
                    format: uuid
                items_to_update:
                  type: array
                  description: "Ajustes de quantidade em itens existentes (action=edit_items)"
                  items:
                    type: object
                    required:
                      - item_id
                      - quantity
                    properties:
                      item_id:
                        type: string
                        format: uuid
                        description: ID do order_item (não do produto)
                      quantity:
                        type: number
                        description: Nova quantidade total (valida delta vs estoque disponível)
            examples:
              update_status:
                summary: Aceitar pedido
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: update_status
                  status: accepted
              add_items:
                summary: Adicionar itens
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: add_items
                  items:
                    - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      quantity: 1
                      unit_price: 20.00
              edit_items:
                summary: Editar itens (remover 1, ajustar qty de outro, adicionar novo)
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: edit_items
                  items_to_remove:
                    - "3026e0e8-2f9f-4381-842d-054d01db7a40"
                  items_to_update:
                    - item_id: "a1b2c3d4-0000-0000-0000-000000000002"
                      quantity: 3
                  items_to_add:
                    - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      quantity: 2
                      unit_price: 15.00
              customer_approved:
                summary: Cliente aprovou os ajustes feitos pelo atendente
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: customer_approved
      responses:
        "200":
          description: Pedido atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OrgContext"
                  - type: object
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
        "400":
          description: Campos obrigatórios ausentes ou action inválido
        "401":
          description: Token inválido
        "404":
          description: Pedido não encontrado
        "403":
          description: |
            Acesso negado. Exemplo: JWT de usuário tentou chamar `customer_approved`
            (ação exclusiva do agente).
        "422":
          description: |
            Transição de status inválida; pedido não permite edição;
            estoque insuficiente para novos itens / aumento de quantidade;
            ou pedido aguardando aprovação do cliente (AWAITING_CUSTOMER_APPROVAL).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StatusTransitionError"
                  - $ref: "#/components/schemas/StockValidationError"
                  - $ref: "#/components/schemas/AwaitingCustomerApprovalError"
              examples:
                transicao_invalida:
                  summary: Transição de status inválida
                  value:
                    error: "Transição inválida: received → cancelled"
                    allowed: []
                estoque_insuficiente:
                  summary: Estoque insuficiente nos itens editados
                  value:
                    error: "Estoque insuficiente para um ou mais produtos"
                    itens_com_erro:
                      - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        descricao: "Café Especial 250g"
                        disponivel: 1
                        solicitado: 5
                aguardando_cliente:
                  summary: Pedido bloqueado aguardando aprovação do cliente
                  value:
                    error: "Este pedido foi modificado e aguarda aprovação do cliente final antes de ser aceito."
                    code: "AWAITING_CUSTOMER_APPROVAL"

# ────────────────────────────────────────────────────────────────────────────
# WEBHOOKS — eventos enviados pelo Pedii ao agente GCP
# ────────────────────────────────────────────────────────────────────────────
webhooks:
  order.status_changed:
    post:
      summary: Mudança de status de pedido pelo lojista
      description: |
        Disparado quando o **lojista** muda o status de um pedido pelo dashboard SaaS.
        Mudanças feitas pelo próprio agente via API **não** disparam este webhook (evita loop).

        **Autenticação recebida:**
        - Header `x-api-key: <AGENT_API_KEY>` — mesma chave usada nas chamadas de saída, header diferente
        - Header `x-internal-secret: <INTERNAL_WEBHOOK_SECRET>` — segredo compartilhado entre Supabase e o agente

        **Casos de uso típicos:**
        - `open → accepted`: notificar cliente que o pedido foi aceito
        - `accepted → shipped`: notificar cliente que o pedido saiu para entrega
        - `shipped → received`: confirmar recebimento
        - `* → cancelled`: informar cancelamento ao cliente

        Use `customers.whatsapp` + `instance_name` para enviar a mensagem via Evolution API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/OrgContext"
                - type: object
                  properties:
                    event:
                      type: string
                      example: order.status_changed
                    order_id:
                      type: string
                      format: uuid
                    old_status:
                      type: string
                      enum: [open, accepted, shipped, received, cancelled]
                    new_status:
                      type: string
                      enum: [open, accepted, shipped, received, cancelled]
                    order:
                      $ref: "#/components/schemas/Order"
            example:
              event: order.status_changed
              order_id: "83781578-c102-4bd3-8f22-9ea6167887aa"
              old_status: open
              new_status: accepted
              organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
              instance_name: "pedii_f988b66e"
              order:
                id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                status: accepted
                total: 310.00
                shipping_value: 10.00
                notes: null
                agent_created: false
                stores:
                  id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                  apelido: Paraguaçu
                  razao_social: TM Farma - Paraguaçu
                customers:
                  id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                  nome: Eloá Mariane da Luz
                  whatsapp: "35982721736"
                order_items:
                  - id: "3026e0e8-2f9f-4381-842d-054d01db7a40"
                    quantity: 15
                    unit_price: 20.00
                    subtotal: 300.00
                    products:
                      id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      descricao: Produto Teste Paraguaçu
      responses:
        "200":
          description: Evento processado com sucesso pelo agente
        "4XX":
          description: Erro no processamento (Pedii registra mas não retenta)

  order.items_updated:
    post:
      summary: Itens do pedido editados pelo atendente
      description: |
        Disparado quando o **atendente no dashboard** edita os itens de um pedido `open`
        antes de aceitá-lo (via `PATCH /orders` com `action: edit_items`).

        Use este evento para comunicar ao cliente final as alterações realizadas em linguagem natural.
        Exemplos:
        - "Um produto foi removido do seu pedido por falta de estoque"
        - "A quantidade do Café Especial foi ajustada de 10 para 3 unidades"
        - "Adicionamos o Produto Alternativo como substituto"

        Use `order.customers.whatsapp` + `instance_name` para enviar a mensagem.
        O campo `order.order_items` reflete o estado **final** do pedido após todas as alterações.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/OrgContext"
                - type: object
                  properties:
                    event:
                      type: string
                      example: order.items_updated
                    order_id:
                      type: string
                      format: uuid
                    changes:
                      type: object
                      description: Resumo das alterações realizadas nesta chamada
                      properties:
                        items_added:
                          type: array
                          description: Novos itens inseridos
                          items:
                            type: object
                            properties:
                              product_id:
                                type: string
                                format: uuid
                              quantity:
                                type: number
                              unit_price:
                                type: number
                        items_removed:
                          type: array
                          description: IDs de order_items removidos
                          items:
                            type: string
                            format: uuid
                        items_updated:
                          type: array
                          description: Itens com quantidade ajustada
                          items:
                            type: object
                            properties:
                              item_id:
                                type: string
                                format: uuid
                              quantity:
                                type: number
                    order:
                      $ref: "#/components/schemas/Order"
            example:
              event: order.items_updated
              order_id: "83781578-c102-4bd3-8f22-9ea6167887aa"
              organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
              instance_name: "pedii_f988b66e"
              changes:
                items_added:
                  - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                    quantity: 2
                    unit_price: 15.00
                items_removed:
                  - "3026e0e8-2f9f-4381-842d-054d01db7a40"
                items_updated:
                  - item_id: "a1b2c3d4-0000-0000-0000-000000000002"
                    quantity: 3
              order:
                id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                status: open
                total: 95.52
                stores:
                  apelido: Varginha
                customers:
                  id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                  nome: João Silva
                  whatsapp: "5531999990000"
                order_items:
                  - id: "a1b2c3d4-0000-0000-0000-000000000002"
                    quantity: 3
                    unit_price: 20.00
                    subtotal: 60.00
                    products:
                      descricao: "Produto Existente"
                  - id: "new-item-uuid"
                    quantity: 2
                    unit_price: 15.00
                    subtotal: 30.00
                    products:
                      descricao: "Produto Alternativo"
      responses:
        "200":
          description: Evento processado com sucesso pelo agente
        "4XX":
          description: Erro no processamento (Pedii registra mas não retenta)
