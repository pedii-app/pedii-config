    post:
      operationId: criarPedido
      summary: Criar pedido
      description: |
        Registra um novo pedido no dashboard do lojista.
        Pode incluir os itens já na criação (recomendado) ou adicioná-los depois via PATCH.

        O campo `shipping_*` deve ser preenchido com o resultado de `POST /calculate-freight`.
        O total do pedido é calculado automaticamente pelo banco (itens + frete).

        **Validação de estoque:** se qualquer item tiver quantidade superior ao estoque disponível,
        retorna 422 com a lista de itens com erro. A criação é bloqueada até o estoque ser suficiente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - store_id
                - customer_id
              properties:
                store_id:
                  type: string
                  format: uuid
                customer_id:
                  type: string
                  format: uuid
                notes:
                  type: string
                  nullable: true
                  description: Observações do pedido (instruções de entrega, referência, etc.)
                shipping_value:
                  type: number
                  format: double
                  default: 0
                  description: Valor do frete em BRL (obtido via /calculate-freight)
                shipping_distance_km:
                  type: number
                  format: double
                  nullable: true
                shipping_within_radius:
                  type: boolean
                  nullable: true
                items:
                  type: array
                  description: Itens do pedido (opcional na criação, pode ser adicionado via PATCH)
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                        example: 2
                      unit_price:
                        type: number
                        format: double
                        example: 32.90
            example:
              store_id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
              customer_id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
              notes: "Entregar no período da tarde"
              shipping_value: 9.72
              shipping_distance_km: 3.24
              shipping_within_radius: true
              items:
                - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                  quantity: 2
                  unit_price: 32.90
      responses:
        "201":
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OrgContext"
                  - type: object
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
        "400":
          description: Campos obrigatórios ausentes
        "401":
          description: Token inválido
        "404":
          description: Loja ou cliente não encontrado
        "422":
          description: Estoque insuficiente para um ou mais itens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockValidationError"
              example:
                error: "Estoque insuficiente para um ou mais produtos"
                itens_com_erro:
                  - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                    descricao: "Café Especial 250g"
                    disponivel: 3
                    solicitado: 10

    patch:
      operationId: atualizarPedido
      summary: Atualizar status ou editar itens do pedido
      description: |
        Três ações disponíveis via campo `action`:

        ---

        **`update_status`** (padrão): Avança o status do pedido conforme a máquina de estados.
        Mudanças feitas pelo agente **não** disparam o webhook `order.status_changed` (evita loop).
        Transições válidas:
        - `open → accepted | cancelled`
        - `accepted → shipped | cancelled`
        - `shipped → received | cancelled`
        - `received` e `cancelled` são estados terminais

        ---

        **`add_items`**: Adiciona novos itens a um pedido `open` ou `accepted`.
        Valida estoque antes de inserir. O total é recalculado automaticamente.

        ---

        **`edit_items`**: Edição completa de itens (adicionar, remover, ajustar quantidades)
        em uma única chamada atômica. Disponível somente para pedidos `open` ou `accepted`.

        Após a operação, dispara o webhook `order.items_updated` ao agente com o resumo
        das alterações e o pedido completo atualizado.

        Casos de uso:
        - Atendente remove item sem estoque antes de aceitar
        - Atendente substitui produto por similar disponível
        - Atendente ajusta quantidade de um item

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  format: uuid
                  description: ID do pedido
                action:
                  type: string
                  enum: [update_status, add_items, edit_items]
                  default: update_status
                # update_status
                status:
                  type: string
                  enum: [accepted, shipped, received, cancelled]
                  description: "Novo status (obrigatório para action=update_status)"
                # add_items
                items:
                  type: array
                  description: "Itens a adicionar (obrigatório para action=add_items)"
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                      unit_price:
                        type: number
                        format: double
                # edit_items
                items_to_add:
                  type: array
                  description: "Novos itens a inserir no pedido (action=edit_items)"
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                      - unit_price
                    properties:
                      product_id:
                        type: string
                        format: uuid
                      quantity:
                        type: number
                      unit_price:
                        type: number
                        format: double
                items_to_remove:
                  type: array
                  description: "IDs de order_items a remover (action=edit_items). Estoque é restaurado."
                  items:
                    type: string
                    format: uuid
                items_to_update:
                  type: array
                  description: "Ajustes de quantidade em itens existentes (action=edit_items)"
                  items:
                    type: object
                    required:
                      - item_id
                      - quantity
                    properties:
                      item_id:
                        type: string
                        format: uuid
                        description: ID do order_item (não do produto)
                      quantity:
                        type: number
                        description: Nova quantidade total (valida delta vs estoque disponível)
            examples:
              update_status:
                summary: Aceitar pedido
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: update_status
                  status: accepted
              add_items:
                summary: Adicionar itens
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: add_items
                  items:
                    - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      quantity: 1
                      unit_price: 20.00
              edit_items:
                summary: Editar itens (remover 1, ajustar qty de outro, adicionar novo)
                value:
                  id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                  action: edit_items
                  items_to_remove:
                    - "3026e0e8-2f9f-4381-842d-054d01db7a40"
                  items_to_update:
                    - item_id: "a1b2c3d4-0000-0000-0000-000000000002"
                      quantity: 3
                  items_to_add:
                    - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      quantity: 2
                      unit_price: 15.00
      responses:
        "200":
          description: Pedido atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OrgContext"
                  - type: object
                    properties:
                      order:
                        $ref: "#/components/schemas/Order"
        "400":
          description: Campos obrigatórios ausentes ou action inválido
        "401":
          description: Token inválido
        "404":
          description: Pedido não encontrado
        "422":
          description: |
            Transição de status inválida; pedido não permite edição;
            ou estoque insuficiente para novos itens / aumento de quantidade
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/StatusTransitionError"
                  - $ref: "#/components/schemas/StockValidationError"
              examples:
                transicao_invalida:
                  summary: Transição de status inválida
                  value:
                    error: "Transição inválida: received → cancelled"
                    allowed: []
                estoque_insuficiente:
                  summary: Estoque insuficiente nos itens editados
                  value:
                    error: "Estoque insuficiente para um ou mais produtos"
                    itens_com_erro:
                      - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                        descricao: "Café Especial 250g"
                        disponivel: 1
                        solicitado: 5

# ────────────────────────────────────────────────────────────────────────────
# WEBHOOKS — eventos enviados pelo Pedii ao agente GCP
# ────────────────────────────────────────────────────────────────────────────
webhooks:
  order.status_changed:
    post:
      summary: Mudança de status de pedido pelo lojista
      description: |
        Disparado quando o **lojista** muda o status de um pedido pelo dashboard SaaS.
        Mudanças feitas pelo próprio agente via API **não** disparam este webhook (evita loop).

        **Autenticação recebida:**
        - Header `Authorization: Bearer <AGENT_API_KEY>` — mesma chave usada nas chamadas de saída
        - Header `x-internal-secret` — segredo compartilhado entre Supabase e o agente

        **Casos de uso típicos:**
        - `open → accepted`: notificar cliente que o pedido foi aceito
        - `accepted → shipped`: notificar cliente que o pedido saiu para entrega
        - `shipped → received`: confirmar recebimento
        - `* → cancelled`: informar cancelamento ao cliente

        Use `customers.whatsapp` + `instance_name` para enviar a mensagem via Evolution API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/OrgContext"
                - type: object
                  properties:
                    event:
                      type: string
                      example: order.status_changed
                    order_id:
                      type: string
                      format: uuid
                    old_status:
                      type: string
                      enum: [open, accepted, shipped, received, cancelled]
                    new_status:
                      type: string
                      enum: [open, accepted, shipped, received, cancelled]
                    order:
                      $ref: "#/components/schemas/Order"
            example:
              event: order.status_changed
              order_id: "83781578-c102-4bd3-8f22-9ea6167887aa"
              old_status: open
              new_status: accepted
              organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
              instance_name: "pedii_f988b66e"
              order:
                id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                status: accepted
                total: 310.00
                shipping_value: 10.00
                notes: null
                agent_created: false
                stores:
                  id: "4d22e5f2-8138-4a67-9446-88d46ed4ee0c"
                  apelido: Paraguaçu
                  razao_social: TM Farma - Paraguaçu
                customers:
                  id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                  nome: Eloá Mariane da Luz
                  whatsapp: "35982721736"
                order_items:
                  - id: "3026e0e8-2f9f-4381-842d-054d01db7a40"
                    quantity: 15
                    unit_price: 20.00
                    subtotal: 300.00
                    products:
                      id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                      descricao: Produto Teste Paraguaçu
      responses:
        "200":
          description: Evento processado com sucesso pelo agente
        "4XX":
          description: Erro no processamento (Pedii registra mas não retenta)

  order.items_updated:
    post:
      summary: Itens do pedido editados pelo atendente
      description: |
        Disparado quando o **atendente no dashboard** edita os itens de um pedido `open`
        antes de aceitá-lo (via `PATCH /orders` com `action: edit_items`).

        Use este evento para comunicar ao cliente final as alterações realizadas em linguagem natural.
        Exemplos:
        - "Um produto foi removido do seu pedido por falta de estoque"
        - "A quantidade do Café Especial foi ajustada de 10 para 3 unidades"
        - "Adicionamos o Produto Alternativo como substituto"

        Use `order.customers.whatsapp` + `instance_name` para enviar a mensagem.
        O campo `order.order_items` reflete o estado **final** do pedido após todas as alterações.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/OrgContext"
                - type: object
                  properties:
                    event:
                      type: string
                      example: order.items_updated
                    order_id:
                      type: string
                      format: uuid
                    changes:
                      type: object
                      description: Resumo das alterações realizadas nesta chamada
                      properties:
                        items_added:
                          type: array
                          description: Novos itens inseridos
                          items:
                            type: object
                            properties:
                              product_id:
                                type: string
                                format: uuid
                              quantity:
                                type: number
                              unit_price:
                                type: number
                        items_removed:
                          type: array
                          description: IDs de order_items removidos
                          items:
                            type: string
                            format: uuid
                        items_updated:
                          type: array
                          description: Itens com quantidade ajustada
                          items:
                            type: object
                            properties:
                              item_id:
                                type: string
                                format: uuid
                              quantity:
                                type: number
                    order:
                      $ref: "#/components/schemas/Order"
            example:
              event: order.items_updated
              order_id: "83781578-c102-4bd3-8f22-9ea6167887aa"
              organization_id: "f988b66e-21e6-48d5-a90d-08f746600763"
              instance_name: "pedii_f988b66e"
              changes:
                items_added:
                  - product_id: "d5fbd8da-de30-43f8-ba35-99ff2758ed32"
                    quantity: 2
                    unit_price: 15.00
                items_removed:
                  - "3026e0e8-2f9f-4381-842d-054d01db7a40"
                items_updated:
                  - item_id: "a1b2c3d4-0000-0000-0000-000000000002"
                    quantity: 3
              order:
                id: "83781578-c102-4bd3-8f22-9ea6167887aa"
                status: open
                total: 95.52
                stores:
                  apelido: Varginha
                customers:
                  id: "3ed79bc1-c2f1-4c5c-95e4-d9fa1a212b4c"
                  nome: João Silva
                  whatsapp: "5531999990000"
                order_items:
                  - id: "a1b2c3d4-0000-0000-0000-000000000002"
                    quantity: 3
                    unit_price: 20.00
                    subtotal: 60.00
                    products:
                      descricao: "Produto Existente"
                  - id: "new-item-uuid"
                    quantity: 2
                    unit_price: 15.00
                    subtotal: 30.00
                    products:
                      descricao: "Produto Alternativo"
      responses:
        "200":
          description: Evento processado com sucesso pelo agente
        "4XX":
          description: Erro no processamento (Pedii registra mas não retenta)
